# Mainnet configuration for dreamdex-bot.
# Starts more conservatively than testnet for the first hour, then we can
# bump aggressiveness once we've confirmed mainnet behavior matches testnet.

bot:
  # Drawdown baseline. Set to actual remaining session capital (~$49 wallet
  # + locked collateral as of 2026-06-10), not the original 100 — half was
  # burned by the taker mill before the maker pivot, and measuring drawdown
  # against money that's already gone makes the max_drawdown rule a hair
  # trigger (it kill-switched on a phantom -90% during a requote window).
  # Lowered 2026-06-12: the max_drawdown rule (80%) against the old $50
  # baseline ordered the bot to retire at $10 equity — which it did, with
  # $8.93 of usable fuel left and first place 23K away (trader-3 gas-bricked
  # at 784K with capital stranded in WETH). Baseline 10 → floor $2: burn
  # everything down to dust, then stop.
  starting_capital_usd: 10.00
  markets_to_watch:
    - SOMI:USDso
    - WETH:USDso
    - USDC.e:USDso
    - WBTC:USDso

bootstrap:
  enabled: false
  candidate_markets:
    - SOMI:USDso
    - WETH:USDso
    - WBTC:USDso
  min_quote_balance_usd: "5.00"
  target_quote_to_spend_usd: "3.00"
  max_quote_fraction: "0.10"
  reserve_quote_usd: "45.00"
  min_base_value_usd: "1.00"
  min_ask_depth_usd: "10.00"
  max_spread_bps: "50.0"

wallet_approvals:
  # Reuse one ERC-20 allowance per pool/token instead of approving each cycle.
  # This reduces on-chain tx count and gas usage for high-frequency trading.
  mode: max

unattended:
  min_native_somi: "1.00"
  # Phase 2 survival mode: drain wallet to ~$1 (min quantity floor)
  # instead of pausing at $1 USDso. The strategy already clamps each
  # buy to 95% of available balance, so removing this floor doesn't
  # risk negative balances — it just lets every remaining dollar work.
  min_liquid_usdso: "0"
  max_runtime_sec: 72000
  max_submitted_orders: 20000
  drawdown_confirmations: 10
  # Phase 2: matches the post-Layer-2 ~3s/tx cadence so the inventory
  # tracker stays fresh and IOC sells don't simulate-fail on stale state.
  # Parallel asyncio.gather makes refresh cheap (~1s for 4 markets x 2 tokens).
  balance_refresh_min_interval_sec: 2.0

strategies:
  volume_mill:
    # CORRECTION 2026-06-10 night: the stablecoin-pair ban was NOT lifted —
    # the earlier USDC.e config was a misread of the org's message. Back to
    # WETH+WBTC, the allowed pairs with the tightest spreads (~2.0-2.1bp,
    # 0.97bp realized burn measured on the milestone-1 run). SOMI:USDso was
    # evaluated and rejected: 9.5-19bp spread makes it ~5-10x more expensive
    # per volume dollar — it would cap the remaining $45 at ~50-95K volume.
    # 5s cycles + full-balance sizing (95%-of-free clamp shares the balance
    # across the two markets, effectively alternating full cycles).
    enabled: true
    # SOMI:USDso re-added 2026-06-11 morning (user request) after the gas
    # exhaustion stall (native_somi_below_floor at 04:55). Known trade-offs
    # from the first rotation: ~1.45bp blended burn (vs 0.97bp without) and
    # a sell-skip ratchet that accumulates SOMI — which is now a FEATURE:
    # leftover SOMI is native gas, so SOMI cycles keep the tank topped up
    # and the mill becomes gas-self-sustaining. Bounded at $6/cycle, 12bp
    # gate so it can't dominate the burn.
    markets:
      - WETH:USDso
      - WBTC:USDso
      - SOMI:USDso
    cycle_interval_sec: 5.0
    size_per_cycle_usd: 2.00
    size_per_cycle_usd_by_market:
      WETH:USDso: "45.00"
      WBTC:USDso: "45.00"
      SOMI:USDso: "6.00"
    max_inventory_imbalance_usd: 80.00
    # Only cycle at the 2bp spread floor; skip flickers and one-sided books.
    max_spread_bps: 3.0
    max_spread_bps_by_market:
      SOMI:USDso: 12.0
    min_side_depth_usd: 100.00
    depth_usage_fraction: 0.50
    ioc_cross_bps: 2.0
    profit_aware_exit_enabled: false
    take_profit_bps: 1.0
    max_hold_sec: 45.0
    entry_max_spread_bps: 3.0
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"

  yield_maker:
    # Disabled 2026-06-10 evening. Live result over 12h / 4 deploys: ~$300
    # of captured volume — the dominant maker won nearly every fill, so the
    # $7.7K/h available flow never translated. Switched to the mill for
    # reliable volume. Config (improve_ticks:1, flatten valve, $20 quotes)
    # left intact for a future attempt with more capital / a quieter pair.
    enabled: false
    paper_mode: false
    market: WETH:USDso
    quote_mode: top_of_book
    improve_ticks: 1
    target_base_value_usd: 20.00
    quote_size_usd: 20.00
    min_book_spread_bps: 0.5
    min_side_depth_usd: 100.00
    min_half_spread_bps: 1
    # Flatten valve: shed excess WETH via taker IOC back to target.
    # INVARIANT (learned 2026-06-10, first live hour): inventory moves in
    # quote_size ($20) jumps, so thresholds must respect the quantum —
    #   valve in (target, target + quote_size]   → fires on the FIRST fill
    #   pause cap > target + 2 × quote_size      → only a failed valve trips it
    # The first deploy had valve 30 / cap 35 with $20 jumps: a second bid
    # fill went $20 → $40 over both lines at once and the sticky pause
    # bricked the strategy (risk evaluates before strategies each tick).
    # Cost: ~2 bps on the excess slice above target, pennies per event.
    flatten_above_usd: 25.00
    flatten_cross_bps: 2.0
    gamma: 0.5
    k_vol: 2.0
    requote_threshold_bps: 1.0
    requote_min_interval_sec: 3.0
    vol_window: 60
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"

# Phase 2 Finding 1 mitigation: the WS orderbook channel goes silently
# stale per-symbol (documented twice: USDC.e Phase 1, USDC.e again 2026-06-09
# during the live maker test — quotes sat 5 bps off the real BBO with zero
# fills). The engine polls REST and replaces the in-memory book whenever the
# BBO disagrees by more than max_drift_bps. Without this, maker quoting
# silently produces nothing; do not disable while yield_maker is enabled.
book_reconcile:
  enabled: true
  interval_sec: 4.0
  max_drift_bps: 1.5
  # Idle state reconciliation: if no tx has fired for idle_after_sec, re-read
  # balances + open orders and clear strategy quote-tracking for orders that
  # vanished (missed fill/cancel WS event). Without this the maker silently
  # wedged 3x on 2026-06-10 — believing it was quoting while holding nothing.
  # idle_miss_threshold: require the order missing on N consecutive polls
  # before dropping it, so the flaky open-orders listing (Finding 11) can't
  # clear a genuinely-resting quote.
  idle_after_sec: 45.0
  idle_miss_threshold: 2

risk:
  realized_loss:
    max_loss_usd: 90.00          # Phase 2: burn capital for volume milestones
  inventory_drift:
    # Police the WETH maker: pause it if WETH holdings leave [-0.5, 60.5] USD.
    # The cap MUST clear target + 2 × quote_size (20 + 40 = 60): inventory
    # moves in $20 fill-quanta and the flatten valve (fires at $25, sells
    # back to $20) needs room to act before this sticky pause does. The
    # pause now only fires if the valve failed twice in a row — and when it
    # fires, the engine cancels all resting orders (pause-cancel fix).
    enabled: true
    market: WETH:USDso
    max_drift_usd: 30.50
    target_base_usd: 30.00
    strategy: yield_maker
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"
  failed_tx_streak:
    max_streak: 3                # More paranoid on mainnet
  ws_staleness:
    max_silence_sec: 45.0
  open_orders_cap:
    max_open: 6
  max_drawdown:
    max_drawdown_pct: 80.0
