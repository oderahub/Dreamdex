# Mainnet configuration for dreamdex-bot.
# Starts more conservatively than testnet for the first hour, then we can
# bump aggressiveness once we've confirmed mainnet behavior matches testnet.

bot:
  starting_capital_usd: 100.00
  markets_to_watch:
    - SOMI:USDso
    - WETH:USDso
    - USDC.e:USDso
    - WBTC:USDso

bootstrap:
  enabled: false
  candidate_markets:
    - SOMI:USDso
    - WETH:USDso
    - WBTC:USDso
  min_quote_balance_usd: "5.00"
  target_quote_to_spend_usd: "3.00"
  max_quote_fraction: "0.10"
  reserve_quote_usd: "45.00"
  min_base_value_usd: "1.00"
  min_ask_depth_usd: "10.00"
  max_spread_bps: "50.0"

wallet_approvals:
  # Reuse one ERC-20 allowance per pool/token instead of approving each cycle.
  # This reduces on-chain tx count and gas usage for high-frequency trading.
  mode: max

unattended:
  min_native_somi: "1.00"
  # Phase 2 survival mode: drain wallet to ~$1 (min quantity floor)
  # instead of pausing at $1 USDso. The strategy already clamps each
  # buy to 95% of available balance, so removing this floor doesn't
  # risk negative balances — it just lets every remaining dollar work.
  min_liquid_usdso: "0"
  max_runtime_sec: 72000
  max_submitted_orders: 20000
  drawdown_confirmations: 10
  # Phase 2: matches the post-Layer-2 ~3s/tx cadence so the inventory
  # tracker stays fresh and IOC sells don't simulate-fail on stale state.
  # Parallel asyncio.gather makes refresh cheap (~1s for 4 markets x 2 tokens).
  balance_refresh_min_interval_sec: 2.0

strategies:
  volume_mill:
    # Disabled 2026-06-10 — taker ping-pong has a hard lifetime-volume
    # ceiling of 2·capital/spread ≈ $490K on the remaining ~$49 at the
    # 2 bps floor, which cannot reach milestone 3. It would also self-match
    # against our own yield_maker quotes on WETH (cancelTaker STP silently
    # drops the IOC), producing zero volume there. Capital now backs the
    # maker quotes instead.
    enabled: false
    markets:
      - WETH:USDso
      - WBTC:USDso
    cycle_interval_sec: 10.0
    size_per_cycle_usd: 2.00
    size_per_cycle_usd_by_market:
      WETH:USDso: "25.00"
      WBTC:USDso: "35.00"
    max_inventory_imbalance_usd: 80.00
    # Phase 2 survival mode: only cycle when the book is at its 2-bps floor.
    # Skipping the 7-bps tail saves real burn we can't afford over 1 week.
    max_spread_bps: 3.0
    min_side_depth_usd: 100.00
    depth_usage_fraction: 0.50
    ioc_cross_bps: 2.0
    profit_aware_exit_enabled: false
    take_profit_bps: 1.0
    max_hold_sec: 45.0
    entry_max_spread_bps: 3.0
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"

  yield_maker:
    # Re-enabled 2026-06-10 after a 30-min read-only flow measurement
    # (tools/measure_maker_flow.py → logs/maker-flow-measure-30m.jsonl):
    #   WETH:USDso  205 trades (6.8/min), $16.5K/hour two-sided taker flow,
    #               median gap 7.4s, median spread 2.07 bps
    #   WBTC/SOMI   1 trade each in 30 min — dead, do not quote there
    # Projected capture for a $20 quote with 1-tick improvement: ~$10K/hour
    # of maker fill volume at zero spread cost (fills EARN ~half-spread).
    # The two documented live-test failure causes are now addressed:
    #   - book_reconcile (top-level block) fixes silent WS staleness
    #     (Phase 2 Finding 1: quotes sat 5 bps off BBO, zero fills)
    #   - improve_ticks: 1 fixes the queue-position loss (Finding 6) —
    #     price priority over the dominant maker costs 0.06 bps on WETH.
    enabled: true
    paper_mode: false
    market: WETH:USDso
    quote_mode: top_of_book
    improve_ticks: 1
    target_base_value_usd: 20.00
    quote_size_usd: 20.00
    min_book_spread_bps: 0.5
    min_side_depth_usd: 100.00
    min_half_spread_bps: 1
    # Flatten valve: shed excess WETH via taker IOC at $30, safely below the
    # inventory_drift pause cap at $35 (the pause is sticky and strands
    # resting quotes — prevention is the only unattended-safe option).
    # Cost: ~2 bps on the excess slice above target, pennies per event.
    flatten_above_usd: 30.00
    flatten_cross_bps: 2.0
    gamma: 0.5
    k_vol: 2.0
    requote_threshold_bps: 1.0
    requote_min_interval_sec: 3.0
    vol_window: 60
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"

# Phase 2 Finding 1 mitigation: the WS orderbook channel goes silently
# stale per-symbol (documented twice: USDC.e Phase 1, USDC.e again 2026-06-09
# during the live maker test — quotes sat 5 bps off the real BBO with zero
# fills). The engine polls REST and replaces the in-memory book whenever the
# BBO disagrees by more than max_drift_bps. Without this, maker quoting
# silently produces nothing; do not disable while yield_maker is enabled.
book_reconcile:
  enabled: true
  interval_sec: 4.0
  max_drift_bps: 1.5

risk:
  realized_loss:
    max_loss_usd: 90.00          # Phase 2: burn capital for volume milestones
  inventory_drift:
    # Police the WETH maker: pause it if WETH holdings leave [0, 35] USD.
    # Startup is base=0 (drift 17.50 < 17.51, inside bounds); inventory
    # builds passively via bid fills. Runaway one-sided accumulation
    # beyond ~$35 pauses the strategy instead of growing exposure.
    enabled: true
    market: WETH:USDso
    max_drift_usd: 17.51
    target_base_usd: 17.50
    strategy: yield_maker
    native_base_reserve_by_market:
      SOMI:USDso: "10.00"
  failed_tx_streak:
    max_streak: 3                # More paranoid on mainnet
  ws_staleness:
    max_silence_sec: 45.0
  open_orders_cap:
    max_open: 6
  max_drawdown:
    max_drawdown_pct: 80.0
